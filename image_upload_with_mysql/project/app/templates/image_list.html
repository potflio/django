<!DOCTYPE html>
<html>
<head>
    <title>Image List</title>
</head>
<body>
    <h1>Image List</h1>
    <ul>
        {% for image in images %}
            <li>
                <h2>{{ image.title }}</h2>
                <img src="{{ image.image.url }}" alt="{{ image.title }}" width="300">
                <p>Uploaded at: {{ image.uploaded_at }}</p>
            </li>
        {% endfor %}
    </ul><br>
    <a href="{% url 'upload_image' %}"><button>Upload New Image</button></a>
    
</body>
</html>
