{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="{% static 'script.js' %}"></script>
</head>

<body>
    <form>
        {% csrf_token %}
        <label for="name">Username</label>
        <input type="text" name="name" id="name"><br><br>
        <label for="skills">Skills</label>
        <input type="radio" value="programming" name="skills">Programming
        <input type="radio" value="design" name="skills">Design <br><br>
        <label for="hobbies">Hobbies</label>
        <input type="checkbox" value="gaming" name="hobbies">Gaming
        <input type="checkbox" value="football" name="hobbies">Football
        <input type="checkbox" value="swimming" name="hobbies">Swimming
        <button type="button" id="create">click me</button>
    </form>
</body>

</html>
